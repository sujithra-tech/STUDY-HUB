<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Study Hub Dashboard</title>

<link rel="stylesheet" href="FRONTEND/css/dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>STUDY HUB</h2>

<ul>

<li>🏠 Home</li>
<li class="active">📊 Dashboard</li>
<li>📅 Schedule</li>
<li>💻 Practice Here</li>
<li>⏱ Timer</li>

</ul>

<div class="profile">
👤 priya
</div>

</div>


<!-- MAIN CONTENT -->

<div class="main">

<h1>Dashboard</h1>
<p class="subtitle">Manage your tutorials and notes</p>


<div class="progress-box">

<h3>Progress Tracker</h3>

<div class="cards">

<!-- DAY STREAK -->

<div class="card">

<div class="icon">🔥</div>

<h2 id="streak">1</h2>

<p>Day Streak</p>

</div>


<!-- STUDY TIME -->

<div class="card">

<div class="icon">⏱</div>

<h2 id="studyTime">0h</h2>

<p>Study Time</p>

</div>

</div>

</div>


<!-- TUTORIAL CARD -->

<div class="large-card">

<div>
<h3>Tutorials</h3>
<p>0 items saved</p>
</div>

<span>➜</span>

</div>


<!-- NOTES CARD -->

<div class="large-card">

<div>
<h3>Note Here</h3>
<p>0 notes saved</p>
</div>

<span>➜</span>

</div>


</div>

</div>

<script src="FRONTEND/js/dashboard.js"></script>

</body>

</html>
