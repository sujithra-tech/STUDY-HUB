<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tutorials - Focus Hub</title>
  <link rel="stylesheet" href="FRONTEND/css/tutorial.css">
</head>
<body>
  <div class="tutorial-container">
    <h2>Add Tutorial</h2>
    <input type="text" id="titleInput" placeholder="e.g., Python Basics – Part 1">
    <input type="text" id="urlInput" placeholder="https://youtube.com/watch?v=...">
    <button id="addUrlBtn">+ Add URL</button>
    <input type="file" id="fileUpload" multiple>

    <h3>Your Tutorials</h3>
    <div id="tutorialList" class="tutorial-list">
      <p>No tutorials added yet. Add a URL or upload files above!</p>
    </div>
  </div>

  <script src="FRONTEND/js/tutorial.js"></script>
</body>
</html>
